<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SGH Pro</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="CSS/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h2>Acesso TimeClass Pro</h2>
                <p>Gerencie sua instituição</p>
            </div>
            
            <div class="tabs">
                <button class="tab-btn active" id="tabAdmin">Administrador</button>
                <button class="tab-btn" id="tabProfessor">Professor</button>
            </div>

            <form id="adminLoginForm" class="auth-form">
                <div class="input-group">
                    <label>E-mail da Administrador</label>
                    <input type="email" id="adminEmail" placeholder="admin@escola.com" required>
                </div>
                <div class="input-group">
                    <label>Senha</label>
                    <input type="password" id="adminPassword" placeholder="••••••••" required>
                </div>
                
                <div id="registerFields" class="hidden">
                    <div class="input-group">
                        <label>Nome da Escola</label>
                        <input type="text" id="schoolName" placeholder="Ex: Colégio Objetivo">
                    </div>
                </div>

                <button type="submit" id="btnSubmitAdmin" class="btn-primary" style="width:100%">Entrar no Painel</button>
                
                <p style="text-align:center; margin-top:15px; font-size:0.85rem">
                    <span id="authText">Ainda não tem conta?</span> 
                    <a href="#" id="toggleAdminAuth" style="color:var(--primary); font-weight:600">Criar conta</a>
                </p>
            </form>

            <div id="professorLoginArea" class="auth-form hidden">
                <p style="text-align:center; margin-bottom:20px; color:#64748b">Acesse seus horários com sua conta Google.</p>
                <button id="googleLoginBtn" class="btn-google" style="width:100%; display:flex; align-items:center; justify-content:center; gap:12px; background:white; border:1px solid #e2e8f0; padding:12px; border-radius:12px; cursor:pointer; font-family:'Inter', sans-serif; font-weight:600; color:#475569;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24s8.955,20,20,20s20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/><path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/><path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/><path fill="#1976D2" d="M43.611,20.083L43.595,20L42,20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/></svg>
                    Entrar com Google
                </button>
            </div>
            
            <div style="text-align:center; margin-top:25px; font-size:0.75rem; border-top:1px solid #eee; padding-top:15px">
                <p style="color:#94a3b8">&copy; Direitos reservados a Jerry Gleydison - Março 2026</p>
                <a href="https://wa.me/99981453613?text=Olá,%20preciso%20de%20ajuda%20no%20login%20do%20SGH%20Pro" target="_blank" style="color:#25d366; text-decoration:none; display:block; margin-top:5px">Suporte Técnico</a>
            </div>

            <p id="errorMessage" style="color:#ef4444; font-size:0.8rem; text-align:center; margin-top:10px"></p>
        </div>
    </div>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
