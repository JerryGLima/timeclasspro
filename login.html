<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SGH Pro</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h2>Acesso TimeClass Pro</h2>
                <p>Gerencie sua instituição</p>
            </div>
            
            <div class="tabs">
                <button class="tab-btn active" id="tabAdmin">Administrador</button>
                <button class="tab-btn" id="tabProfessor">Professor</button>
            </div>

            <!-- FORMULÁRIO ADMIN -->
            <form id="adminLoginForm" class="auth-form">
                <div class="input-group">
                    <label>E-mail do Administrador</label>
                    <input type="email" id="adminEmail" placeholder="admin@escola.com" required>
                </div>
                <div class="input-group">
                    <label>Senha</label>
                    <input type="password" id="adminPassword" placeholder="••••••••" required>
                </div>
                
                <div id="registerFields" class="hidden">
                    <div class="input-group">
                        <label>Nome da Escola</label>
                        <input type="text" id="schoolName" placeholder="Ex: Colégio Objetivo">
                    </div>
                </div>

                <button type="submit" id="btnSubmitAdmin" class="btn-primary" style="width:100%">Entrar no Painel</button>
                
                <p style="text-align:center; margin-top:15px; font-size:0.85rem">
                    <span id="authText">Ainda não tem conta?</span> 
                    <a href="#" id="toggleAdminAuth" style="color:var(--primary); font-weight:600">Criar conta</a>
                </p>
            </form>

            <!-- FORMULÁRIO PROFESSOR (EMAIL E SENHA) -->
            <form id="professorLoginForm" class="auth-form hidden">
                <p style="text-align:center; margin-bottom:20px; color:#64748b; font-size:0.9rem;">
                    Entre com seu email e senha cadastrados pelo administrador.
                </p>
                <div class="input-group">
                    <label>E-mail</label>
                    <input type="email" id="profEmail" placeholder="professor@escola.com" required>
                </div>
                <div class="input-group">
                    <label>Senha</label>
                    <input type="password" id="profPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary" style="width:100%; background:#6366f1;">Entrar</button>
            </form>
            
            <div style="text-align:center; margin-top:25px; font-size:0.75rem; border-top:1px solid #eee; padding-top:15px">
                <p style="color:#94a3b8">&copy; Direitos reservados a Jerry Gleydison - Março 2026</p>
                <a href="https://wa.me/99981453613?text=Olá,%20preciso%20de%20ajuda%20no%20login%20do%20SGH%20Pro" target="_blank" style="color:#25d366; text-decoration:none; display:block; margin-top:5px">Suporte Técnico</a>
            </div>

            <p id="errorMessage" style="color:#ef4444; font-size:0.8rem; text-align:center; margin-top:10px"></p>
        </div>
    </div>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
